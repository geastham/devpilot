name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - core
          - cli

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Run typecheck
        run: pnpm typecheck

      - name: Publish @devpilot/core
        if: github.event.inputs.package == 'all' || github.event.inputs.package == 'core' || startsWith(github.ref, 'refs/tags/v')
        run: pnpm publish --filter @devpilot/core --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @devpilot/cli
        if: github.event.inputs.package == 'all' || github.event.inputs.package == 'cli' || startsWith(github.ref, 'refs/tags/v')
        run: pnpm publish --filter @devpilot/cli --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
