name: Publish Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.1.0)'
        required: true
      dry_run:
        description: 'Dry run (test without publishing)'
        type: boolean
        default: false

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: pnpm run build

      - name: Run tests
        run: pnpm run test || true

      - name: Typecheck
        run: pnpm run typecheck || true

  publish:
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: pnpm run build

      - name: Get version from tag or input
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version: $VERSION"

      - name: Update package versions
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Update core package
          cd packages/core
          pnpm version $VERSION --no-git-tag-version --allow-same-version
          cd ../..

          # Update bridge-client package
          cd packages/bridge-client
          pnpm version $VERSION --no-git-tag-version --allow-same-version
          cd ../..

          # Update cli package
          cd packages/cli
          pnpm version $VERSION --no-git-tag-version --allow-same-version
          cd ../..

      - name: Publish @devpilot.sh/core
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: pnpm publish --filter @devpilot.sh/core --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @devpilot.sh/bridge-client
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: pnpm publish --filter @devpilot.sh/bridge-client --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @devpilot.sh/cli
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: pnpm publish --filter @devpilot.sh/cli --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Dry run summary
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: |
          echo "## Dry Run Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Would have published:" >> $GITHUB_STEP_SUMMARY
          echo "- @devpilot.sh/core@${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- @devpilot.sh/bridge-client@${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- @devpilot.sh/cli@${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY

      - name: Publish summary
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          echo "## Published Packages" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Successfully published:" >> $GITHUB_STEP_SUMMARY
          echo "- [@devpilot.sh/core@${{ steps.version.outputs.version }}](https://www.npmjs.com/package/@devpilot.sh/core)" >> $GITHUB_STEP_SUMMARY
          echo "- [@devpilot.sh/bridge-client@${{ steps.version.outputs.version }}](https://www.npmjs.com/package/@devpilot.sh/bridge-client)" >> $GITHUB_STEP_SUMMARY
          echo "- [@devpilot.sh/cli@${{ steps.version.outputs.version }}](https://www.npmjs.com/package/@devpilot.sh/cli)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Install with:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "npm install -g @devpilot.sh/cli" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
